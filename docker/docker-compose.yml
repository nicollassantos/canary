name: otbr
services:
  database:
    image: mariadb:latest
    restart: unless-stopped
    env_file:
      - '.env'
    networks:
      - canary-net
    ports:
      - '$MYSQL_PORT:3306'
    volumes:
      - 'db-volume:/var/lib/mysql'
      - ../schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect" ]
      interval: 10s
      timeout: 5s
      retries: 10


  server:
    # cpuset: "0-4"
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      target: prod
    restart: unless-stopped
    env_file:
      - '.env'
    networks:
      - canary-net
    ports:
      - '$gameProtocolPort:$gameProtocolPort'
      - '$statusProtocolPort:$statusProtocolPort'
    volumes:
      - '../:/srv/canary'
    depends_on:
      database:
        condition: service_healthy

  login:
    image: opentibiabr/login-server:latest
    restart: unless-stopped
    environment:
      - LOGIN_HTTP_PORT=8080
      - LOGIN_GRPC_PORT=9090
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=3306
      - MYSQL_DBNAME=ot
      - MYSQL_USER=root
      - MYSQL_PASS=root
      - SERVER_NAME=OTServBR-Global
      - SERVER_IP=127.0.0.1
      - SERVER_PORT=7172
      - SERVER_LOCATION=BRA
      - RATE_LIMITER_RATE=2
      - RATE_LIMITER_BURST=5
      - ENV_LOG_LEVEL=debug
    network_mode: "host"

volumes:
  db-volume:

networks:
  canary-net:
    driver: bridge
